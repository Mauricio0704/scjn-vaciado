services:
  - type: web
    name: scjn-vaciado-api
    runtime: python
    plan: free
    buildCommand: apt-get install -y tesseract-ocr tesseract-ocr-spa && pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
